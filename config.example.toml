# cx-connect configuration
# cx-connect 配置文件
#
# Copy this file to config.toml and fill in your credentials.
# 复制此文件为 config.toml，填入你的凭证信息。

# =============================================================================
# Agent / Agent 配置
# =============================================================================

[agent]
type = "claudecode"
# mode options:
# - "default":            Every tool call requires user approval.
# - "acceptEdits" (edit): File edit tools auto-approved; other tools still ask.
# - "plan":              Claude only plans — no execution until you approve.
# - "bypassPermissions" (yolo): All tool calls auto-approved. Use with caution.
mode = "default"

# Optional: specify a model
# model = "claude-sonnet-4-20250514"

# Optional: pre-approve specific tools (only for default/acceptEdits mode)
# allowed_tools = ["Read", "Grep", "Glob", "Bash", "Edit", "Write"]

# Optional: API providers — switch between them via /provider command in chat
# or via CLI: cx-connect provider add --name relay --api-key sk-xxx
# [[agent.providers]]
# name = "anthropic"
# api_key = "sk-ant-xxx"
#
# [[agent.providers]]
# name = "relay"
# api_key = "sk-xxx"
# base_url = "https://api.relay-service.com"
# model = "claude-sonnet-4-20250514"

# =============================================================================
# Platforms / 平台配置
# =============================================================================

# Feishu / Lark / 飞书
# 1. Create an app at https://open.feishu.cn
# 2. Enable Bot capability
# 3. Add im.message.receive_v1 event, select WebSocket long-connection mode
# 4. Fill in app_id and app_secret below

[[platforms]]
type = "feishu"

[platforms.options]
app_id = "your-feishu-app-id"
app_secret = "your-feishu-app-secret"
# reaction_emoji = "OnIt"  # Emoji reaction on incoming messages (default: "OnIt"); set to "none" to disable

# DingTalk / 钉钉 (uncomment to enable)
# 1. Create an app at https://open-dev.dingtalk.com
# 2. Under "App Features > Bot", enable bot and select Stream mode
# 3. Note the App ID and App Secret, fill below

# [[platforms]]
# type = "dingtalk"
# [platforms.options]
# app_id = "your-dingtalk-app-id"
# app_secret = "your-dingtalk-app-secret"

# Telegram (uncomment to enable)
# 1. Create a bot via @BotFather on Telegram
# 2. Copy the bot token, fill below

# [[platforms]]
# type = "telegram"
# [platforms.options]
# token = "your-telegram-bot-token"

# Slack (uncomment to enable)
# 1. Create a new Slack app at https://api.slack.com/apps
# 2. Enable Socket Mode
# 3. Add bot token scopes: chat:write, channels:history, reactions:write
# 4. Fill in below

# [[platforms]]
# type = "slack"
# [platforms.options]
# bot_token = "xoxb-xxx"
# app_token = "xapp-xxx"

# Discord (uncomment to enable)
# 1. Create a new Application at https://discord.com/developers/applications
# 2. Add a Bot user, enable Message Content Intent
# 3. Fill in below

# [[platforms]]
# type = "discord"
# [platforms.options]
# token = "your-discord-bot-token"

# QQ (uncomment to enable)
# 1. Create a bot at https://q.qq.com
# 2. Fill in below

# [[platforms]]
# type = "qq"
# [platforms.options]
# app_id = "your-qq-app-id"
# token = "your-qq-token"

# =============================================================================
# Allow Users Whitelist / 允许用户白名单 (optional)
# =============================================================================
# Only users in this list can interact with the bot.
# If not specified (empty), all users are allowed.

# [[allow_users]]
# platform = "feishu"
# user_id = "ou_xxxxxxxx"
#
# [[allow_users]]
# platform = "telegram"
# user_id = "123456789"

# =============================================================================
# Global Settings / 全局设置
# =============================================================================

# Language for bot messages
# - "en": English
# - "zh": 中文
# - "" (empty/not set): Auto-detect from user's first message
language = "en"

# Session data storage directory (default: ~/.cx-connect)
# data_dir = "/path/to/custom/dir"

# Local web UI for browsing sessions and injecting prompts.
# Binds to localhost only unless you change the listen address.
# [web]
# enabled = true
# listen = "127.0.0.1:6380"

[log]
level = "info" # debug, info, warn, error

# =============================================================================
# Speech-to-Text (Voice Messages) / 语音转文字
# =============================================================================
# Enable to transcribe voice messages to text before sending to agents.
# Requires ffmpeg for audio format conversion.

# [speech]
# enabled = true
# provider = "openai"    # "openai" or "groq"
# language = ""          # e.g. "zh", "en"; empty = auto-detect
#
# [speech.openai]
# api_key = "sk-xxx"
# base_url = ""         # optional: custom endpoint
# model = "whisper-1"
#
# [speech.groq]
# api_key = "gsk_xxx"
# model = "whisper-large-v3-turbo"
